name: Format agent table store

on:
  push:
    branches:
      - agent/table-store-foundation

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/table-store-foundation
      - name: Setup Rust (pinned)
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - name: Format Rust
        run: cargo fmt --manifest-path rust/Cargo.toml --all
      - name: Commit formatted source and remove this workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -- .github/workflows/format-agent-table-store.yml
          git add rust
          git commit -m "Format table store"
          git push origin HEAD:agent/table-store-foundation
