name: Deploy Playground to Pages

on:
  push:
    branches: [ main ]
    paths: [ "web/**", ".github/workflows/pages.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write   # delete stale artifacts left by a failed earlier attempt

# One deploy at a time; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Pinned to the Node 24 action majors: the runner deprecated Node 20, and
      # older deploy-pages/upload-pages-artifact also retry a timed-out artifact
      # finalize into a *duplicate* upload, which then trips deploy-pages'
      # "multiple artifacts named github-pages" check. The newer majors run on
      # Node 24 and no longer duplicate within an attempt.
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v6
      # If an earlier attempt of THIS run uploaded a `github-pages` artifact and
      # then failed (e.g. a transient Pages/Actions API hiccup), re-running the
      # job adds a *second* artifact to the same run — and deploy-pages aborts
      # with "Multiple artifacts named github-pages … Artifact count is 2",
      # because it resolves the artifact by name and can't disambiguate. Delete
      # any such leftovers so upload below produces exactly one, making re-runs
      # idempotent. (deploy-pages can't yet target an artifact_id: actions/deploy-pages#338.)
      - name: Remove stale github-pages artifacts from earlier attempts
        if: github.run_attempt > 1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
          while read -r id; do
            echo "Deleting stale artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
      # The playground is a static, build-free site: upload web/ as-is.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v5
