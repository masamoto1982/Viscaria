name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      # The toolchain is pinned in rust/rust-toolchain.toml; rustup honours it,
      # so fmt/clippy/test run against exactly the version verified locally.
      - name: Setup Rust (pinned)
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.toml') }}
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test --all-targets --verbose
