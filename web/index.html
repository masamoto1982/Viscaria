<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viscaria — Playground</title>
  <meta name="description" content="Viscaria — an AI-first, table-oriented, exact-real spreadsheet language. Playground.">
  <link rel="stylesheet" href="./styles.css">
  <!-- KaTeX, vendored (Ajisai's math-view approach): no CDN, works offline. -->
  <link rel="stylesheet" href="./vendor/katex/katex.min.css">
  <script defer src="./vendor/katex/katex.min.js"></script>
</head>
<body>
  <header class="app-bar">
    <h1 class="brand">Viscaria</h1>
    <!-- Timestamp version badge (Ajisai's scheme): ver.YYYYMMDDHHMM, the
         build/release time, stamped at deploy and filled in by app.js. -->
    <span class="version" id="version">ver.loading…</span>
    <p class="tagline">table-oriented · exact-real spreadsheet</p>
    <!-- Paper controls for the active sheet: size (A3–B5) and orientation. -->
    <label class="paper-ctl">用紙
      <select id="paper-size" aria-label="Paper size"></select>
    </label>
    <button id="paper-orient" class="paper-orient" type="button" aria-label="Paper orientation">縦</button>
    <!-- Math view toggle (Ajisai's Stack-area checkbox, relocated to the app
         bar since in Viscaria the cells themselves are the stack area).
         Checked = KaTeX rendering of numeric values; unchecked = the
         canonical fraction strings. -->
    <label class="latex-toggle"><input type="checkbox" id="latex-toggle">LaTeX</label>
  </header>

  <!-- Formula bar: breadcrumb path box · fx · value field for the selected cell. -->
  <div class="formula-bar">
    <input id="name-box" class="name-box" aria-label="Selected cell path" spellcheck="false" autocomplete="off" readonly>
    <span class="fx" aria-hidden="true">fx</span>
    <input id="formula-input" class="formula-input" aria-label="Cell value" spellcheck="false" autocomplete="off">
  </div>

  <!-- The board is the scroll area; app.js lays a fixed-size .paper (the active
       sheet's page) onto it and places 親 cells on the paper. -->
  <main class="canvas">
    <div id="board" class="board" role="group" aria-label="Sheet" tabindex="0"></div>
  </main>

  <!-- Sheet tabs (bottom, Google Sheets style): switch, double-click to rename, ＋ to add. -->
  <nav class="sheet-tabs" id="sheet-tabs" aria-label="Sheets"></nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
